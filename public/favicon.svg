<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Background gradient (light blue glass) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8d8f0"/>
      <stop offset="50%" stop-color="#6bbde8"/>
      <stop offset="100%" stop-color="#4aadd8"/>
    </linearGradient>
    <!-- Glass sheen -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="60%" y2="80%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Document shadow -->
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,80,160,0.18)"/>
    </filter>
    <!-- Badge shadow -->
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <!-- DH gradient -->
    <linearGradient id="dhGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Check gradient -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <clipPath id="roundedClip">
      <rect x="8" y="8" width="240" height="240" rx="56" ry="56"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#bg)"/>
  <!-- Glass sheen overlay -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="url(#sheen)" opacity="0.7"/>
  <!-- Inner border highlight -->
  <rect x="8" y="8" width="240" height="240" rx="56" ry="56" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3"/>

  <!-- Document / paper -->
  <g filter="url(#docShadow)">
    <!-- Main page body -->
    <path d="M72 52 L164 52 L196 84 L196 200 Q196 208 188 208 L72 208 Q64 208 64 200 L64 60 Q64 52 72 52 Z"
      fill="white" opacity="0.97"/>
    <!-- Folded corner -->
    <path d="M164 52 L196 84 L164 84 Z" fill="#c8dff0"/>
    <!-- Text lines -->
    <rect x="88" y="108" width="76" height="8" rx="4" fill="#bed4e8" opacity="0.8"/>
    <rect x="88" y="124" width="88" height="8" rx="4" fill="#bed4e8" opacity="0.8"/>
    <rect x="88" y="140" width="60" height="8" rx="4" fill="#bed4e8" opacity="0.8"/>
  </g>

  <!-- DH blue badge -->
  <circle cx="116" cy="178" r="32" fill="url(#dhGrad)" filter="url(#badgeShadow)"/>
  <circle cx="116" cy="178" r="32" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Sheen on badge -->
  <ellipse cx="109" cy="167" rx="14" ry="9" fill="rgba(255,255,255,0.22)" transform="rotate(-20,109,167)"/>
  <!-- DH text -->
  <text x="116" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="800"
    fill="white" text-anchor="middle" letter-spacing="-0.5">DH</text>

  <!-- Green check badge -->
  <circle cx="152" cy="198" r="26" fill="url(#checkGrad)" filter="url(#badgeShadow)"/>
  <circle cx="152" cy="198" r="26" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Sheen on check -->
  <ellipse cx="146" cy="188" rx="10" ry="6" fill="rgba(255,255,255,0.25)" transform="rotate(-20,146,188)"/>
  <!-- Checkmark -->
  <polyline points="140,198 149,207 166,190" fill="none" stroke="white" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>